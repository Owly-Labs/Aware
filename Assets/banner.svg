<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640">
  <!-- Background -->
  <rect width="1280" height="640" fill="#111827"/>

  <!-- Grid -->
  <g stroke="#1a2744" stroke-width="0.5">
    <line x1="160" y1="0" x2="160" y2="640"/>
    <line x1="320" y1="0" x2="320" y2="640"/>
    <line x1="480" y1="0" x2="480" y2="640"/>
    <line x1="640" y1="0" x2="640" y2="640"/>
    <line x1="800" y1="0" x2="800" y2="640"/>
    <line x1="960" y1="0" x2="960" y2="640"/>
    <line x1="1120" y1="0" x2="1120" y2="640"/>
    <line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="320" x2="1280" y2="320"/>
    <line x1="0" y1="480" x2="1280" y2="480"/>
  </g>

  <!-- Ghost body -->
  <g transform="translate(60, 60)">
    <path d="
      M 190 50
      C 110 50, 74 110, 74 180
      L 74 400
      C 74 410, 82 418, 92 410
      L 112 390 C 120 384, 130 384, 138 390
      L 158 410 C 166 416, 176 416, 184 410
      L 196 398 C 204 392, 214 392, 222 398
      L 242 416 C 250 422, 260 422, 268 416
      L 288 396 C 296 390, 306 398, 306 408
      L 306 180
      C 306 110, 270 50, 190 50 Z
    " fill="#c0cbda"/>

    <!-- Left eye -->
    <ellipse cx="154" cy="170" rx="24" ry="28" fill="#111827"/>
    <ellipse cx="154" cy="170" rx="20" ry="24" fill="#0c6b9e"/>
    <ellipse cx="154" cy="170" rx="10" ry="13" fill="#0ea5e9"/>
    <circle cx="148" cy="162" r="4" fill="#ffffff"/>

    <!-- Right eye -->
    <ellipse cx="226" cy="170" rx="24" ry="28" fill="#111827"/>
    <ellipse cx="226" cy="170" rx="20" ry="24" fill="#0c6b9e"/>
    <ellipse cx="226" cy="170" rx="10" ry="13" fill="#0ea5e9"/>
    <circle cx="220" cy="162" r="4" fill="#ffffff"/>

    <!-- Brackets -->
    <path d="M 54 100 L 44 100 L 44 240 L 54 240" stroke="#2980b9" stroke-width="2" fill="none"/>
    <path d="M 326 100 L 336 100 L 336 240 L 326 240" stroke="#2980b9" stroke-width="2" fill="none"/>
  </g>

  <!-- Swift bird -->
  <g transform="translate(366, 88)">
    <path d="
      M 42 8
      C 42 8, 28 22, 15 32
      C 26 28, 36 28, 42 32
      C 28 40, 13 45, 3 46
      C 13 49, 28 48, 42 41
      C 44 44, 46 48, 46 52
      C 50 45, 50 34, 42 8 Z
    " fill="#F05138"/>
  </g>

  <!-- Title -->
  <text x="520" y="248" font-family="-apple-system, BlinkMacSystemFont, Helvetica Neue, sans-serif" font-weight="700" font-size="96" fill="#f1f5f9">SwiftAware</text>

  <!-- Tagline -->
  <text x="524" y="316" font-family="-apple-system, BlinkMacSystemFont, Helvetica Neue, sans-serif" font-weight="400" font-size="28" fill="#8896ab">Ghost UI toolkit for LLM-assisted iOS development</text>

  <!-- Feature pills -->
  <rect x="524" y="368" width="116" height="34" rx="17" fill="#15253d" stroke="#1e3a5f" stroke-width="1"/>
  <text x="582" y="390" text-anchor="middle" font-family="monospace" font-size="14" fill="#38bdf8">.ghostID()</text>

  <rect x="654" y="368" width="116" height="34" rx="17" fill="#15253d" stroke="#1e3a5f" stroke-width="1"/>
  <text x="712" y="390" text-anchor="middle" font-family="monospace" font-size="14" fill="#38bdf8">@AutoLog</text>

  <rect x="784" y="368" width="78" height="34" rx="17" fill="#15253d" stroke="#1e3a5f" stroke-width="1"/>
  <text x="823" y="390" text-anchor="middle" font-family="monospace" font-size="14" fill="#38bdf8">MCP</text>

  <rect x="876" y="368" width="162" height="34" rx="17" fill="#15253d" stroke="#1e3a5f" stroke-width="1"/>
  <text x="957" y="390" text-anchor="middle" font-family="monospace" font-size="14" fill="#38bdf8">@TrackedState</text>

  <rect x="524" y="414" width="148" height="34" rx="17" fill="#15253d" stroke="#1e3a5f" stroke-width="1"/>
  <text x="598" y="436" text-anchor="middle" font-family="monospace" font-size="14" fill="#38bdf8">Plan vs Actual</text>

  <rect x="686" y="414" width="130" height="34" rx="17" fill="#15253d" stroke="#1e3a5f" stroke-width="1"/>
  <text x="751" y="436" text-anchor="middle" font-family="monospace" font-size="14" fill="#38bdf8">Test Runner</text>

  <!-- Bottom platform info -->
  <text x="524" y="524" font-family="-apple-system, sans-serif" font-size="16" fill="#586880">Swift 6.0</text>
  <circle cx="604" cy="520" r="2" fill="#3d4e63"/>
  <text x="618" y="524" font-family="-apple-system, sans-serif" font-size="16" fill="#586880">iOS 17+</text>
  <circle cx="698" cy="520" r="2" fill="#3d4e63"/>
  <text x="712" y="524" font-family="-apple-system, sans-serif" font-size="16" fill="#586880">macOS 14+</text>
  <circle cx="814" cy="520" r="2" fill="#3d4e63"/>
  <text x="828" y="524" font-family="-apple-system, sans-serif" font-size="16" fill="#586880">SPM</text>
</svg>
